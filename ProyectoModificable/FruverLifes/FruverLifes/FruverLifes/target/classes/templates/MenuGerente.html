<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Gerente</title>

    <link rel="stylesheet" th:href="@{/Estilo-MenuGerente.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        function mostrarSeccion(id) {
            const seccion = document.getElementById(id);
            if (seccion.style.display === "none" || seccion.style.display === "") {
                seccion.style.display = "block";
            } else {
                seccion.style.display = "none";
            }
        }
    </script>
</head>

<body>

<div class="Gerente">
    <header class="header">
        <h1>FruverLife</h1>

        <div class="usuario">

            <span>
                <strong>Usuario:</strong>
                <span th:text="${session.usuarioLogueado?.usuario}"></span>
            </span>
            <span>
                <strong>Rol:</strong>
                <span th:text="${session.usuarioLogueado?.cargo}"></span>
            </span>

        </div>
    </header>

    <aside class="barra">
        <nav class="Acciones">
            <ul>
                <li><a href="#">Informe de mercancía</a></li>
                <li><a href="#">Informe Diario</a></li>
                <li><a href="#">Informe de Desperdicios</a></li>
                <li><a href="#">Listado de Stock</a></li>

                <li><a href="#" onclick="mostrarSeccion('usuario')">Registro de usuario</a></li>

                <li><a href="/auth/logout" class="cerrar-sesion">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="Menu">

        <!-- REGISTRO USUARIO -->
        <div id="usuario" class="contenedor" style="display:none;">
            <h2>Registro de Usuario</h2>

            <form id="formRegistro">

                <label>Nombre:</label>
                <input type="text" name="nombreUsuario" required>

                <label>Contraseña:</label>
                <input type="password" name="contrasenia" required>

                <label>Cargo:</label>
                <input type="text" name="cargo" required>

                <button type="submit">Registrar</button>
            </form>

            <p id="mensaje"></p>
        </div>

    </main>

</div>

<script>
    document.getElementById("formRegistro").addEventListener("submit", function(e) {
        e.preventDefault();

        const datos = new FormData(this);

        fetch("http://localhost:8080/usuarios/registro", {
            method: "POST",
            body: datos
        })
        .then(response => response.json())
        .then(data => {
            const mensaje = document.getElementById("mensaje");

            mensaje.innerText = data.mensaje;

            if (data.mensaje.includes("❌")) {
                mensaje.style.color = "red";
            } else {
                mensaje.style.color = "green";
            }

            this.reset();
        })
        .catch(() => {
            document.getElementById("mensaje").innerText = "Error al registrar";
        });
    });
</script>

</body>
</html>
