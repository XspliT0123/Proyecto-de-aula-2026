<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Menu Administrador</title>
    <link rel="stylesheet" th:href="@{/Estilo-MenuAdmi.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("toggleMenu").addEventListener("click", function (e) {
                e.preventDefault();
                document.getElementById("submenu").classList.toggle("activo");
            });
        });
    </script>
</head>
<body>
    <div class="Administrador">
        <header class="header">
            <h1>FruverLife</h1>
            <div class="usuario">
            <span>
                <strong>Usuario:</strong>
                <span th:text="${session.usuarioLogueado?.usuario}"></span>
            </span>
                <span>
                <strong>Rol:</strong>
                <span th:text="${session.usuarioLogueado?.cargo}"></span>
            </span>
            </div>
        </header>
        <aside class="barra">
            <nav class="Acciones">
                <ul>
                    <li class="opcion"><a href="#" id="toggleMenu"><span>Gestion de Stock</span><i
                                class="fas fa-chevron-down" style="color: rgba(35, 36, 37, 0.726);"></i></a>
                        <ul class="submenu" id="submenu">
                            <li><a href="#">Listado de Stock</a></li>
                            <li><a href="#">Agregar Producto</a></li>
                            <li><a href="#">Modificar Producto</a></li>
                            <li><a href="#">Eliminar Producto</a></li>
                        </ul>
                    </li>
                    <li><a href="#"> Gestion De Desperdicios</a></li>
                    <li><a href="#"> Registro de Proveedores</a></li>
                    <li><a href="#"> Ingreso de Mercancia</a></li>
                    <li><a href="/auth/logout" class="cerrar-sesion">Cerrar Sesion</a></li>
                </ul>
            </nav>
        </aside>
    </div>
</body>

</html>
