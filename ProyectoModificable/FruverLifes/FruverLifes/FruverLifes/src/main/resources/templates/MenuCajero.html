<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caja</title>

    <link rel="stylesheet" th:href="@{/Estilo-MenuCajero.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function mostrarSeccion(id) {
            document.getElementById(id).style.display = "block";

            // Guardar sección activa
            localStorage.setItem("seccionActiva", id);
        }

        window.onload = function() {
            const seccion = localStorage.getItem("seccionActiva");

            if (seccion) {
                document.getElementById(seccion).style.display = "block";
            }
        }
    </script>
</head>

<body>

<div class="Gerente">


    <div class="header">
            <h1>FruverLife</h1>
            <div class="usuario">
            <span>
                <strong>Usuario:</strong>
                <span th:text="${session.usuarioLogueado?.usuario}"></span>
            </span>
                <span>
                <strong>Rol:</strong>
                <span th:text="${session.usuarioLogueado?.cargo}"></span>
            </span>
            </div>
    </div>

    <aside class="barra">
        <ul class="Acciones">
            <li>
                <a href="#" onclick="mostrarSeccion('Cliente')">
                    Registro de cliente
                </a>
            </li>
            <li><a href="#">Realizar venta</a></li>
            <li><a href="#">Anular producto</a></li>
            <li><a href="#">Verificar precio</a></li>
            <li><a href="/auth/logout" class="cerrar-sesion">Cerrar Sesion</a></li>
        </ul>
    </aside>
    <main class="Menu">

        <div id="Cliente" style="display: none;">

            <div class="contenedor-flex">

                <!-- FORMULARIO -->
                <div class="contenedor">
                    <h2>Registro de clientes</h2>

                    <form action="/Cliente/registrocli" method="post">
                        <input type="number" name="id" placeholder="ID" required>
                        <input type="text" name="nombre" placeholder="Nombre" required>
                        <input type="text" name="numeroCe" placeholder="Celular" required>
                        <input type="email" name="correo" placeholder="Correo" required>

                        <button>Registrar</button>
                    </form>
                </div>

                <!-- TABLA -->
                <div class="tabla-clientes">
                    <h2>Lista de clientes</h2>

                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Celular</th>
                            <th>Correo</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="cliente : ${clientes}">
                            <td th:text="${cliente.id}"></td>
                            <td th:text="${cliente.nombre}"></td>
                            <td th:text="${cliente.numeroCe}"></td>
                            <td th:text="${cliente.correo}"></td>

                            <td>
                                <a th:href="@{'/Cliente/eliminar/' + ${cliente.id}}" class="btn-eliminar">
                                    Eliminar
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
